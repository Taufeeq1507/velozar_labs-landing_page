<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Network Error | Velozar Labs</title>
    <meta name="robots" content="noindex">

    <link rel="preload"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap">
    </noscript>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/legal.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        .error-container {
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px dashed var(--border-legal);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            padding: 40px;
            margin-top: 40px;
        }

        .error-code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 5rem;
            color: #ef4444;
            letter-spacing: -0.05em;
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
        }

        .error-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .error-desc {
            color: var(--muted-legal);
            margin-bottom: 30px;
            max-width: 400px;
        }

        .return-btn {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .return-btn:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
            border-color: #3b82f6;
        }
    </style>
</head>

<body>
    <nav class="back-nav">
        <a href="/">&lt; Initialize connection to primary node</a>
    </nav>

    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-title">Endpoint Not Found</div>
        <div class="error-desc">The requested resource could not be located in the active deployment manifest. It may
            have been relocated, restricted, or terminated.</div>
        <a href="/" class="return-btn">Return to Base</a>
    </div>

    <footer class="legal-footer" style="margin-top: auto; border-top: none; padding-top: 60px;">
        <a href="/">Home</a>
        <a href="/docs">Docs</a>
        <a href="/user-guide">User Guide</a>
        <a href="/terms">Terms</a>
        <a href="/privacy">Privacy</a>
        <span>&copy; 2026 Velozar Labs</span>
    </footer>
</body>

</html>
